app:
  title: FPS Developer Portal
  baseUrl: https://fps-backstage.livelysmoke-675ed463.centralindia.azurecontainerapps.io

organization:
  name: FPS Platform Team

backend:
  baseUrl: https://fps-backstage.livelysmoke-675ed463.centralindia.azurecontainerapps.io
  listen:
    port: 7007
    host: 0.0.0.0
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: https://fps-backstage.livelysmoke-675ed463.centralindia.azurecontainerapps.io
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: backstage
      ssl:
        require: true
        rejectUnauthorized: false

# ------------------------------------------------------------
# Integrations
# ------------------------------------------------------------
integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

  azure:
    - host: dev.azure.com
      credentials:
        - personalAccessToken: ${AZURE_DEVOPS_TOKEN}

# ------------------------------------------------------------
# Azure DevOps Plugin
# ------------------------------------------------------------
azureDevOps:
  host: dev.azure.com
  token: ${AZURE_DEVOPS_TOKEN}
  organization: BA001101770

# ------------------------------------------------------------
# Authentication — guest mode for POC
# ------------------------------------------------------------
auth:
  providers:
    guest: {}

# ------------------------------------------------------------
# TechDocs
# ------------------------------------------------------------
techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

# ------------------------------------------------------------
# Scaffolder
# ------------------------------------------------------------
scaffolder:
  defaultAuthor:
    name: FPS Platform Bot
    email: platform@fps.com
  defaultCommitMessage: "feat: scaffold new service from FPS template"

# ------------------------------------------------------------
# Catalog
# ------------------------------------------------------------
catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow:
        - Component
        - System
        - API
        - Resource
        - Location
        - Group
        - User
  locations:
    # Local catalog
    - type: file
      target: ./catalog-info.yaml

    # Full FPS catalog from GitHub
    - type: url
      target: https://raw.githubusercontent.com/bennyantony2500/fps-local/master/catalog-info.yaml
      rules:
        - allow:
            - Component
            - System
            - API
            - Resource
            - Group
            - User

    # Example templates for scaffolder
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

# ------------------------------------------------------------
# Proxy
# ------------------------------------------------------------
proxy:
  endpoints:
    '/azure-devops':
      target: 'https://dev.azure.com'
      headers:
        Authorization: Basic ${AZURE_DEVOPS_TOKEN_BASE64}

# ------------------------------------------------------------
# Kubernetes
# ------------------------------------------------------------
kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters: []

# ------------------------------------------------------------
# Permissions
# ------------------------------------------------------------
permission:
  enabled: false